spring.profiles.active=${PROFILE}
server.port=${SERVER_PORT:8080}
spring.application.name=budget-bridge
server.servlet.context-path=/api/v1

api.url=${API_URL}
frontend.url=${FRONTEND_URL}

kc.realm=${KC_REALM}
kc.url=${KC_URL}
kc.client-id=${KC_CLIENT_ID}
kc.client-secret=${KC_CLIENT_SECRET}
kc.jwks-uri=${KC_JWKS_URI}

spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}

springdoc.swagger-ui.oauth.client-id=${KC_CLIENT_ID}
springdoc.swagger-ui.oauth.client-secret=${KC_CLIENT_SECRET}